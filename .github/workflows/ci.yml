name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: task setup

      - run: task check
