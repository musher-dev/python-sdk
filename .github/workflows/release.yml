name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: uv build

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - uses: pypa/gh-action-pypi-publish@release/v1
