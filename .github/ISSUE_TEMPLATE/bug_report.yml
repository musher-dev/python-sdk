name: Bug Report
description: Report a bug in the Musher Python SDK
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version
      description: "Output of: python -c \"import musher; print(musher.__version__)\""
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Output of: python --version"
    validations:
      required: true
