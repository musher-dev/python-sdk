version: "3"

tasks:
  setup:
    desc: Install dependencies
    cmds:
      - uv sync --dev

  setup:examples:
    desc: Install dependencies including example extras
    cmds:
      - uv sync --dev --extra examples

  check:
    desc: Run all checks (format + lint + types + test)
    cmds:
      - task: check:format-check
      - task: check:lint
      - task: check:types
      - task: check:test

  check:format:
    desc: Format code with ruff
    cmds:
      - uv run ruff format .

  check:format-check:
    desc: Check formatting without modifying files
    cmds:
      - uv run ruff format --check .

  check:lint:
    desc: Run ruff linter
    cmds:
      - uv run ruff check .

  check:types:
    desc: Run basedpyright type checker
    cmds:
      - uv run basedpyright

  check:test:
    desc: Run pytest
    cmds:
      - uv run pytest

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/ .ruff_cache/ .pytest_cache/ htmlcov/ .coverage
      - find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
      - find . -type d -name "*.egg-info" -exec rm -rf {} + 2>/dev/null || true
